name: Build FL App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      
      - name: Create fresh Android project
        run: |
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flex_temp .
          cd $GITHUB_WORKSPACE
          rm -rf android ios
          cp -r /tmp/fresh_project/android .
          cp -r /tmp/fresh_project/ios .
          rm -rf /tmp/fresh_project
      
      - name: Apply custom app name
        run: |
          # تطبيق اسم التطبيق المخصص
          echo "<?xml version=\"1.0\" encoding=\"utf-8\"?>" > android/app/src/main/res/values/strings.xml
          echo "<resources>" >> android/app/src/main/res/values/strings.xml
          echo "    <string name=\"app_name\">Flex Yemen Market</string>" >> android/app/src/main/res/values/strings.xml
          echo "</resources>" >> android/app/src/main/res/values/strings.xml
          
          # تحديث AndroidManifest.xml
          sed -i 's/android:label="flex_temp"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/*.apk
