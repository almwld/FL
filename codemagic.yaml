workflows:
  flex-yemen-android:
    name: Flex Yemen Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Create fresh Flutter project
        script: |
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flex_temp .
          cd $CM_BUILD_DIR
          rm -rf android ios
          cp -r /tmp/fresh_project/android .
          cp -r /tmp/fresh_project/ios .
          rm -rf /tmp/fresh_project
      
      - name: Get packages
        script: flutter pub get
      
      - name: Generate app icons
        script: flutter pub run flutter_launcher_icons
      
      - name: Build APK
        script: flutter build apk --release --split-per-abi
      
      - name: Build AppBundle
        script: flutter build appbundle --release
      
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
